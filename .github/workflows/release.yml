name: Attach build to Release

# Releases are created manually (e.g. `gh release create vX.Y.Z --generate-notes`).
# When a release is published, this workflow compiles the project, packs a
# tarball whose version matches the tag, and uploads it as a release asset so it
# can be installed with `pnpm add -g <asset-url>` without any build step.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Quality gate: if tests fail, the job fails and no tarball is attached,
      # so a broken release is never installable. Second layer behind
      # scripts/release.sh (which gates locally before tagging).
      - name: Test
        run: pnpm test

      - name: Set package version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Build
        run: pnpm build

      - name: Pack tarball
        run: pnpm pack --pack-destination ./dist

      - name: Upload tarball to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" ./dist/*.tgz --clobber
